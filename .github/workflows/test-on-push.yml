name: Test on Push

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure gradle-antlr-plugin is available
        shell: bash
        run: |
          set -euo pipefail
          ROOT_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          if [ -d "$ROOT_PARENT/gradle-antlr-plugin/.git" ]; then
            echo "✓ gradle-antlr-plugin already present"
            exit 0
          fi
          
          echo "Cloning gradle-antlr-plugin from $OWNER..."
          if git clone --depth 1 "https://github.com/$OWNER/gradle-antlr-plugin.git" "$ROOT_PARENT/gradle-antlr-plugin"; then
            echo "✓ Successfully cloned from $OWNER/gradle-antlr-plugin"
            exit 0
          fi
          
          echo "Falling back to jurgenei/gradle-antlr-plugin..."
          if git clone --depth 1 "https://github.com/jurgenei/gradle-antlr-plugin.git" "$ROOT_PARENT/gradle-antlr-plugin"; then
            echo "✓ Successfully cloned from jurgenei/gradle-antlr-plugin"
            exit 0
          fi
          
          echo "✘ Could not clone gradle-antlr-plugin from any source"
          exit 1

      - name: Ensure gradle-antlr-parse-plugin is available (optional)
        shell: bash
        continue-on-error: true
        run: |
          ROOT_PARENT="$(dirname "$GITHUB_WORKSPACE")"
          OWNER="${GITHUB_REPOSITORY_OWNER}"
          
          if [ -d "$ROOT_PARENT/gradle-antlr-parse-plugin/.git" ]; then
            echo "✓ gradle-antlr-parse-plugin already present"
            exit 0
          fi
          
          echo "Cloning gradle-antlr-parse-plugin from $OWNER..."
          if git clone --depth 1 "https://github.com/$OWNER/gradle-antlr-parse-plugin.git" "$ROOT_PARENT/gradle-antlr-parse-plugin"; then
            echo "✓ Successfully cloned from $OWNER/gradle-antlr-parse-plugin"
            exit 0
          fi
          
          echo "Falling back to jurgenei/gradle-antlr-parse-plugin..."
          if git clone --depth 1 "https://github.com/jurgenei/gradle-antlr-parse-plugin.git" "$ROOT_PARENT/gradle-antlr-parse-plugin"; then
            echo "✓ Successfully cloned from jurgenei/gradle-antlr-parse-plugin"
            exit 0
          fi
          
          echo "⚠ gradle-antlr-parse-plugin not available (optional); tests will proceed without it"
          exit 0

      - name: Build gradle-antlr-parse-plugin when referenced
        shell: bash
        run: |
          set -euo pipefail
          ROOT_PARENT="$(dirname "$GITHUB_WORKSPACE")"

          if grep -q 'includeBuild("../gradle-antlr-parse-plugin")' settings.gradle; then
            if [ -f "$ROOT_PARENT/gradle-antlr-parse-plugin/gradlew" ]; then
              chmod +x "$ROOT_PARENT/gradle-antlr-parse-plugin/gradlew"
              "$ROOT_PARENT/gradle-antlr-parse-plugin/gradlew" -p "$ROOT_PARENT/gradle-antlr-parse-plugin" --no-daemon clean build
            else
              echo "settings.gradle references gradle-antlr-parse-plugin, but repository is unavailable"
              exit 1
            fi
          else
            echo "Skipping parse plugin build (not referenced by settings.gradle)."
          fi

      - name: Run tests
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --stacktrace :test

