#-------------------------------------------------------------------------------#
#            Discover all capabilities of Qodana in our documentation           #
#             https://www.jetbrains.com/help/qodana/about-qodana.html           #
#-------------------------------------------------------------------------------#

name: Qodana

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qodana:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip Qodana when token is unavailable
        if: ${{ secrets.QODANA_TOKEN == '' }}
        run: echo "QODANA_TOKEN is not available for this event; skipping Qodana scan."
      - name: 'Qodana Scan'
        if: ${{ secrets.QODANA_TOKEN != '' }}
        uses: JetBrains/qodana-action@v2026.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: false
          use-annotations: false
          upload-result: false
          push-fixes: 'none'

