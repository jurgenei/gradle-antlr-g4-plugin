plugins {
    id 'java'
    id 'antlr'
    id 'xmlast'
}

repositories {
    mavenCentral()
}

dependencies {
    antlr 'org.antlr:antlr4:4.13.2'
    implementation 'org.antlr:antlr4-runtime:4.13.2'
}

tasks.named('xmlast', name.jurgenei.gradle.antlr.XmlAstGradleTask) {
    sourceDirectory.set(layout.projectDirectory.dir('src/test/resources/antlr4'))
    destinationDirectory.set(layout.buildDirectory.dir('xmlast-samples'))

    parserClassName.set('name.jurgenei.parsers.ANTLRv4Parser')
    lexerClassName.set('name.jurgenei.parsers.ANTLRv4Lexer')
    startRule.set('grammarSpec')

    includes.set(['**/*.g4'])
    targetExtension.set('.xml')

    // Add compiled generated classes and runtime libs.
    runtimeClasspath.from(configurations.testRuntimeClasspath, files("$buildDir/classes/java/antlr"))
}

